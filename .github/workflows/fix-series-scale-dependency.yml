name: Fix series scale dependency

on:
  push:
    branches:
      - feature/series-style-ui-controls

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Fix, build, validate, and commit
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone --quiet --depth 1 --branch feature/series-style-ui-controls "https://x-access-token:${GH_TOKEN}@github.com/chihall0828/CSV_Data_Compare.git" repo
          cd repo

          python - <<'PY'
          from pathlib import Path

          path = Path("src/App.jsx")
          text = path.read_text(encoding="utf-8")

          duplicate = '''    yAxisLabel,
              yScaleType,
              yMax,
              yMin,
              yScaleType
            ]);'''
          corrected = '''    yAxisLabel,
              yScaleType,
              yMax,
              yMin
            ]);'''
          if text.count(duplicate) != 1:
              raise SystemExit(f"display dependency target count: {text.count(duplicate)}")
          text = text.replace(duplicate, corrected, 1)

          chart_dependencies = '''    xScaleType,
              yMax,
              yMin
            ]);'''
          chart_dependencies_with_scale = '''    xScaleType,
              yMax,
              yMin,
              yScaleType
            ]);'''
          if text.count(chart_dependencies) != 1:
              raise SystemExit(f"chart dependency target count: {text.count(chart_dependencies)}")
          text = text.replace(chart_dependencies, chart_dependencies_with_scale, 1)

          path.write_text(text, encoding="utf-8")
          PY

          npm ci --silent
          npm run build
          npm run validate:plot-style

          rm .github/workflows/fix-series-scale-dependency.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix axis scale memo dependencies"
          git push origin feature/series-style-ui-controls
