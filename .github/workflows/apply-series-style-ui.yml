name: Apply series style UI update

on:
  push:
    branches:
      - feature/series-style-ui-controls
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Apply, build, validate, and commit
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone --quiet --depth 1 --branch feature/series-style-ui-controls "https://x-access-token:${GH_TOKEN}@github.com/chihall0828/CSV_Data_Compare.git" repo
          cd repo

          cat scripts/.series-style-patch/patch.gz.b64.* > /tmp/patch.b64
          echo "payload=$(sha256sum /tmp/patch.b64 | cut -d' ' -f1)"
          base64 --decode /tmp/patch.b64 > /tmp/patch.py.gz
          gzip --test /tmp/patch.py.gz
          gzip --decompress --stdout /tmp/patch.py.gz > scripts/apply-series-style-ui-update.py
          echo "script=$(sha256sum scripts/apply-series-style-ui-update.py | cut -d' ' -f1)"
          python scripts/apply-series-style-ui-update.py

          npm ci --silent
          npm run build
          npm run validate:plot-style

          rm -rf scripts/.series-style-patch
          rm scripts/apply-series-style-ui-update.py
          rm .github/workflows/apply-series-style-ui.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add per-series styling and compact graph controls"
          git push origin feature/series-style-ui-controls
