name: Apply series style UI update

on:
  push:
    branches:
      - feature/series-style-ui-controls
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/series-style-ui-controls
          fetch-depth: 1
          show-progress: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Reconstruct and apply update
        id: apply_update
        shell: bash
        run: |
          set +e
          cat scripts/.series-style-patch/patch.gz.b64.* > /tmp/patch.b64
          b64_hash=$(sha256sum /tmp/patch.b64 | cut -d' ' -f1)
          base64 --decode /tmp/patch.b64 > /tmp/patch.py.gz
          decode_status=$?
          gzip --test /tmp/patch.py.gz
          gzip_status=$?
          if [ "$decode_status" -eq 0 ] && [ "$gzip_status" -eq 0 ]; then
            gzip --decompress --stdout /tmp/patch.py.gz > /tmp/apply-series-style-ui-update.py
            script_hash=$(sha256sum /tmp/apply-series-style-ui-update.py | cut -d' ' -f1)
            python /tmp/apply-series-style-ui-update.py > patch-error.log 2>&1
            patch_status=$?
          else
            script_hash="not-generated"
            patch_status=99
          fi
          set -e

          if [ "$decode_status" -ne 0 ] || [ "$gzip_status" -ne 0 ] || [ "$patch_status" -ne 0 ]; then
            {
              echo "base64_sha256=$b64_hash"
              echo "expected_base64_sha256=53062256ab59860a98e189682b3a442881546f8b85e0a6940fc0cdc2f1b7da51"
              echo "decode_status=$decode_status"
              echo "gzip_status=$gzip_status"
              echo "script_sha256=$script_hash"
              echo "expected_script_sha256=d1408509ca495a503cff87149fa44c81555e3b384b82751f7d31948a24cb841a"
              echo "patch_status=$patch_status"
            } >> patch-error.log
            cat patch-error.log
            exit 1
          fi
          rm -f patch-error.log

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Validate plot styles
        run: npm run validate:plot-style

      - name: Commit generated implementation
        shell: bash
        run: |
          rm -rf scripts/.series-style-patch
          rm .github/workflows/apply-series-style-ui.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add per-series styling and compact graph controls"
          git push origin feature/series-style-ui-controls
