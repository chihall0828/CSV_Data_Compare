name: Apply series style UI update

on:
  push:
    branches:
      - feature/series-style-ui-controls
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/series-style-ui-controls
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Reconstruct and apply update
        id: apply_update
        shell: bash
        run: |
          cat scripts/.series-style-patch/patch.gz.b64.* | base64 --decode | gzip --decompress > /tmp/apply-series-style-ui-update.py
          if ! python /tmp/apply-series-style-ui-update.py > patch-error.log 2>&1; then
            cat patch-error.log
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add patch-error.log
            git commit -m "Record series style patch failure"
            git push origin feature/series-style-ui-controls
            exit 1
          fi
          rm -f patch-error.log

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Validate plot styles
        run: npm run validate:plot-style

      - name: Commit generated implementation
        shell: bash
        run: |
          rm -rf scripts/.series-style-patch
          rm .github/workflows/apply-series-style-ui.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add per-series styling and compact graph controls"
          git push origin feature/series-style-ui-controls
