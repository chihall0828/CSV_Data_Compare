name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build for GitHub Pages
        run: npm run build:web
        env:
          VITE_BASE_URL: /${{ github.event.repository.name }}/

      - name: Check GitHub Pages enablement
        id: pages
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          response_file="$(mktemp)"
          status_code="$(
            curl -sS -o "$response_file" -w "%{http_code}" \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages"
          )"

          if [ "$status_code" = "200" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "GitHub Pages is enabled for ${GITHUB_REPOSITORY}." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          if [ "$status_code" = "404" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            {
              echo "GitHub Pages is not enabled or is not configured for GitHub Actions."
              echo ""
              echo "Skipping deployment. Enable GitHub Pages in repository settings to publish this build."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "GitHub Pages API check failed with HTTP ${status_code}." >&2
          cat "$response_file" >&2
          exit 1

      - name: Setup Pages
        if: steps.pages.outputs.enabled == 'true'
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        if: steps.pages.outputs.enabled == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

    outputs:
      pages_enabled: ${{ steps.pages.outputs.enabled }}

  deploy:
    if: needs.build.outputs.pages_enabled == 'true'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
